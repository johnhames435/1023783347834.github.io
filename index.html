<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Matrix Chaos</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
      color: #fff;
      font-family: monospace;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
    }
  </style>
</head>
<body>

  <audio id="creepysound" src="creepy.mp3" preload="auto"></audio>

  <script>
    window.onload = () => {
      const sound = document.getElementById('creepysound');
      sound.loop = true;

      // Try autoplay
      sound.play().catch(() => {
        // If blocked, require click
        const msg = document.createElement("div");
        msg.textContent = "Click to begin";
        msg.style.position = "absolute";
        msg.style.top = "50%";
        msg.style.left = "50%";
        msg.style.transform = "translate(-50%, -50%)";
        msg.style.fontSize = "3rem";
        msg.style.color = "red";
        msg.style.cursor = "pointer";
        document.body.appendChild(msg);

        msg.onclick = () => {
          sound.play();
          msg.remove();
          startMatrix();
        };
        return;
      });

      startMatrix();
    };
